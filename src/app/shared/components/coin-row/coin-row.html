<div
  role="link"
  tabindex="0"
  class="coin-row bg-white dark:bg-transparent flex items-center justify-between gap-4 p-4 hover:bg-gray-100 dark:hover:bg-white/5 transition-all cursor-pointer border-b border-gray-200 dark:border-white/5"
  (click)="openAssetPage()"
  (keydown.enter)="openAssetPage()"
>
  <div class="flex items-center gap-3 flex-1 min-w-0">
    <button
      type="button"
      class="w-10 h-10 shrink-0 rounded-full border border-gray-200 dark:border-white/10 bg-white dark:bg-white/5 hover:bg-yellow-50 dark:hover:bg-yellow-500/10 transition-all text-xl"
      title="افزودن به دیده‌بان"
      (click)="toggleWatchlist($event)"
    >
      <span [ngClass]="isStarred ? 'text-yellow-500' : 'text-gray-400'">
        {{ isStarred ? '★' : '☆' }}
      </span>
    </button>

    <div
      class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-sm"
      [ngClass]="badgeColor"
    >
      {{ initial }}
    </div>

    <div class="min-w-0">
      <h3 class="font-bold text-gray-900 dark:text-white truncate">
        {{ displayName }}
      </h3>
      <p class="text-xs uppercase text-gray-400">
        {{ displaySymbol }}
      </p>
    </div>
  </div>

  <div class="text-left shrink-0">
    <div class="font-mono font-black text-gray-900 dark:text-white" dir="ltr">
      ${{ formatPrice(coin.price) }}
    </div>

    <div class="text-sm font-bold" [ngClass]="changeMeta.className" dir="ltr">
      {{ changeMeta.label }}
    </div>
  </div>
</div>
