<div
  class="min-h-screen bg-slate-50 text-slate-900 transition-colors duration-500 dark:bg-[#070b0f] dark:text-white"
>
  <nav
    class="sticky top-0 z-50 border-b border-slate-200/80 bg-white/85 px-4 py-4 backdrop-blur-xl dark:border-white/10 dark:bg-[#12171c]/85 sm:px-6"
  >
    <div class="mx-auto grid max-w-7xl grid-cols-[auto_1fr_auto] items-center gap-4">
      <!-- Logo -->
      <a routerLink="/home" class="flex items-center gap-3">
        <div
          class="flex h-12 w-12 items-center justify-center rounded-2xl bg-yellow-500 shadow-lg shadow-yellow-500/25 transition hover:scale-105"
        >
          <span class="text-xl font-black text-black">S</span>
        </div>

        <span class="hidden text-sm font-black text-slate-800 dark:text-white sm:block">
          Sanay
        </span>
      </a>

      <!-- Desktop capsule nav -->
      <div class="hidden justify-center md:flex">
        <div
          class="flex items-center gap-1 rounded-[1.6rem] border border-slate-200 bg-slate-100/80 p-1.5 shadow-sm dark:border-white/10 dark:bg-white/[0.04]"
        >
          <a
            routerLink="/home"
            routerLinkActive="bg-yellow-500 text-black shadow-lg shadow-yellow-500/20"
            class="rounded-2xl px-5 py-2.5 text-sm font-black text-slate-600 transition-all hover:bg-white hover:text-slate-950 dark:text-slate-300 dark:hover:bg-white/10 dark:hover:text-white"
          >
            خانه
          </a>

          <a
            routerLink="/market"
            routerLinkActive="bg-yellow-500 text-black shadow-lg shadow-yellow-500/20"
            class="rounded-2xl px-5 py-2.5 text-sm font-black text-slate-600 transition-all hover:bg-white hover:text-slate-950 dark:text-slate-300 dark:hover:bg-white/10 dark:hover:text-white"
          >
            مارکت
          </a>

          <a
            routerLink="/watchlist"
            routerLinkActive="bg-yellow-500 text-black shadow-lg shadow-yellow-500/20"
            class="rounded-2xl px-5 py-2.5 text-sm font-black text-slate-600 transition-all hover:bg-white hover:text-slate-950 dark:text-slate-300 dark:hover:bg-white/10 dark:hover:text-white"
          >
            دیده‌بان
          </a>

          <a
            routerLink="/login"
            routerLinkActive="bg-yellow-500 text-black shadow-lg shadow-yellow-500/20"
            class="rounded-2xl px-5 py-2.5 text-sm font-black text-slate-600 transition-all hover:bg-white hover:text-slate-950 dark:text-slate-300 dark:hover:bg-white/10 dark:hover:text-white"
          >
            ورود/ثبت‌نام
          </a>
        </div>
      </div>

      <!-- Theme button -->
      <div class="flex justify-end">
        <button
          type="button"
          (click)="toggleTheme()"
          class="flex h-12 w-12 items-center justify-center rounded-2xl border border-slate-200 bg-slate-100 text-xl shadow-sm transition-all hover:-translate-y-0.5 hover:bg-slate-200 dark:border-white/10 dark:bg-white/5 dark:hover:bg-white/10"
          aria-label="Toggle theme"
        >
          {{ isDarkMode() ? '☀️' : '🌙' }}
        </button>
      </div>
    </div>
  </nav>

  <main class="min-h-[calc(100svh-5rem)] pb-24 md:pb-0">
    <router-outlet></router-outlet>
    <app-trading-modal />
  </main>

  <!-- Mobile bottom nav -->
  <nav
    class="fixed bottom-4 left-1/2 z-50 flex w-[calc(100%-2rem)] max-w-md -translate-x-1/2 items-center justify-between rounded-[1.7rem] border border-slate-200 bg-white/90 p-2 shadow-2xl backdrop-blur-xl dark:border-white/10 dark:bg-[#12171c]/90 md:hidden"
  >
    <a
      routerLink="/home"
      routerLinkActive="bg-yellow-500 text-black"
      class="flex min-w-0 flex-1 flex-col items-center gap-1 rounded-2xl px-2 py-2 text-xs font-black text-slate-500 transition dark:text-slate-300"
    >
      <span>⌂</span>
      <span>خانه</span>
    </a>

    <a
      routerLink="/market"
      routerLinkActive="bg-yellow-500 text-black"
      class="flex min-w-0 flex-1 flex-col items-center gap-1 rounded-2xl px-2 py-2 text-xs font-black text-slate-500 transition dark:text-slate-300"
    >
      <span>↗</span>
      <span>مارکت</span>
    </a>

    <a
      routerLink="/watchlist"
      routerLinkActive="bg-yellow-500 text-black"
      class="flex min-w-0 flex-1 flex-col items-center gap-1 rounded-2xl px-2 py-2 text-xs font-black text-slate-500 transition dark:text-slate-300"
    >
      <span>★</span>
      <span>دیده‌بان</span>
    </a>

    <a
      routerLink="/login"
      routerLinkActive="bg-yellow-500 text-black"
      class="flex min-w-0 flex-1 flex-col items-center gap-1 rounded-2xl px-2 py-2 text-xs font-black text-slate-500 transition dark:text-slate-300"
    >
      <span>●</span>
      <span>ورود</span>
    </a>
  </nav>
</div>
