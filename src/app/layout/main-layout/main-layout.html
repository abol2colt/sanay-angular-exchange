<div
  class="min-h-screen bg-gray-50 text-gray-900 dark:bg-[#0b0e11] dark:text-white transition-colors duration-500"
>
  <nav
    class="sticky top-0 z-50 bg-white/80 dark:bg-white/5 backdrop-blur-lg border-b border-gray-200 dark:border-white/5 px-6 py-4 flex justify-between items-center"
  >
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center shadow-lg">
        <span class="text-black font-black text-xl">S</span>
      </div>

      <div class="flex items-center gap-3">
        <a
          routerLink="/home"
          routerLinkActive="bg-yellow-500 text-black shadow-lg"
          class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-white/10"
        >
          خانه
        </a>

        <a
          routerLink="/market"
          routerLinkActive="bg-yellow-500 text-black shadow-lg"
          class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-white/10"
        >
          مارکت
        </a>

        <a
          routerLink="/watchlist"
          routerLinkActive="bg-yellow-500 text-black shadow-lg"
          class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-white/10"
        >
          دیده‌بان
        </a>

        <a
          routerLink="/login"
          routerLinkActive="bg-yellow-500 text-black shadow-lg"
          class="px-4 py-2 rounded-xl text-sm font-bold transition-all text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-white/10"
        >
          ورود/ثبت‌نام
        </a>

        <button
          type="button"
          (click)="toggleTheme()"
          class="p-3 rounded-2xl bg-gray-200 dark:bg-white/5 border border-transparent dark:border-white/10 hover:bg-gray-300 dark:hover:bg-white/10 transition-all"
        >
          {{ isDarkMode() ? '☀️' : '🌙' }}
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-4 md:p-8">
    <router-outlet></router-outlet>
  </main>
</div>
