<section class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-12">
  <div
    class="pointer-events-none absolute right-[-5rem] top-[-5rem] h-[30rem] w-[30rem] rounded-full bg-yellow-400/20 blur-[100px] dark:bg-yellow-500/10"
  ></div>
  <div
    class="pointer-events-none absolute bottom-[-5rem] left-[-5rem] h-[25rem] w-[25rem] rounded-full bg-blue-400/20 blur-[100px] dark:bg-blue-500/10"
  ></div>

  <div
    class="relative w-full max-w-[440px] rounded-[2.5rem] border border-white/20 bg-white/40 p-10 shadow-2xl backdrop-blur-2xl transition-all duration-500 dark:border-white/5 dark:bg-white/[0.03] dark:shadow-black/40"
  >
    <div class="mb-10 text-center">
      <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">
        {{ isLoginMode() ? 'ورود به حساب' : 'ساخت حساب جدید' }}
      </h1>
      <p class="mt-3 text-sm font-medium text-slate-600 dark:text-slate-400">
        {{ isLoginMode() ? 'خوش آمدید! مشخصات خود را وارد کنید' : 'به خانواده ثنای خوش آمدید' }}
      </p>
    </div>

    <form class="space-y-6" (submit)="handleAuth(); $event.preventDefault()">
      <div class="space-y-2">
        <label
          class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-500"
          >ایمیل یا شماره موبایل</label
        >
        <input
          type="text"
          name="email"
          [(ngModel)]="email"
          class="dir-ltr w-full rounded-2xl border border-slate-200 bg-white/50 px-5 py-4 text-slate-900 outline-none transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-white/10 dark:bg-black/40 dark:text-white"
          placeholder="name@company.com"
        />
      </div>

      <div class="space-y-2">
        <label
          class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-500"
          >رمز عبور</label
        >
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          class="dir-ltr w-full rounded-2xl border border-slate-200 bg-white/50 px-5 py-4 text-slate-900 outline-none transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-white/10 dark:bg-black/40 dark:text-white"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        class="group relative w-full overflow-hidden rounded-2xl bg-blue-600 py-4 font-bold text-white shadow-lg shadow-blue-600/20 transition-all hover:bg-blue-700 hover:shadow-blue-600/40 active:scale-[0.98]"
      >
        <span class="relative z-10">{{ isLoginMode() ? 'ورود به پنل' : 'تایید و ثبت‌نام' }}</span>
      </button>
    </form>

    <div class="mt-10 border-t border-slate-200 pt-8 text-center dark:border-white/5">
      <p class="text-sm font-medium text-slate-600 dark:text-slate-400">
        {{ isLoginMode() ? 'هنوز عضو نشده‌اید؟' : 'قبلاً ثبت‌نام کرده‌اید؟' }}
        <button
          (click)="toggleMode()"
          class="mr-1 font-bold text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300"
        >
          {{ isLoginMode() ? 'ایجاد حساب کاربری' : 'ورود به حساب' }}
        </button>
      </p>
    </div>
  </div>
</section>
