<section class="space-y-6">
  <header>
    <h2 class="text-4xl font-black mb-2 text-gray-900 dark:text-white">دیده‌بان</h2>

    <p class="text-gray-500 dark:text-gray-400 text-sm">
      ارزهای ستاره‌دار اینجا نمایش داده می‌شوند.
    </p>
  </header>

  @if (marketStore.watchlistCoins().length) {
    <app-coin-list [coins]="marketStore.watchlistCoins()" />
  } @else {
    <app-empty-state
      icon="⭐"
      title="دیده‌بان خالی است"
      description="از لیست بازار روی ستاره بزن تا ارزها اینجا نمایش داده شوند."
    />
  }
</section>
